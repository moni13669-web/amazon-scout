async function fetchWithRetry(asin, domain, maxTries = 4) {
  for (let i = 1; i <= maxTries; i++) {
    try {
      if (i > 1) await sleep(600 * i);
      const res  = await fetch(`${API}/api/product?asin=${asin}&domain=${domain}`);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text || !text.trim()) continue;
      const data = JSON.parse(text);
      if (!data.error) return data;
    } catch(e) { /* retry */ }
  }
  return { asin, error: 'Failed', title: null, price: null, rating: null, availability: 'Error' };
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function isFailed(r) {
  // A result is "failed" if it has an error OR no title AND no price
  return !!(r.error || (!r.title && !r.price));
}

function setProgress(label, current, total, currentMsg) {
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  document.getElementById('progressLabel').textContent  = label;
  document.getElementById('progressBar').style.width    = pct + '%';
  document.getElementById('progressCount').textContent  = `${current} / ${total}`;
  document.getElementById('progressCurrent').textContent = currentMsg;
async function fetchOnceRaw(asin, domain) {
  const res  = await fetch(`${API}/api/product?asin=${asin}&domain=${domain}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  if (!text || !text.trim()) throw new Error('Empty response');
  const data = JSON.parse(text);
  if (data.error) throw new Error(data.error);
  return data;
}

async function fetchUntilSuccess(asin, domain, idx, maxAttempts = 20) {
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      if (attempt > 1) await sleep(300 + Math.random() * 700);
      const data = await fetchOnceRaw(asin, domain);
      bulkResults[idx] = data;
      return true;
    } catch(e) {
      bulkResults[idx] = {
        asin, error: `Retrying… (attempt ${attempt})`,
        title: null, price: null, rating: null, availability: 'Retrying'
      };
    }
  }
  bulkResults[idx] = { asin, error: 'Could not fetch', title: null, price: null, rating: null, availability: 'Error' };
  return false;
}

function updateProgressUI(done, total, retryingCount) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressLabel').textContent   = retryingCount > 0
    ? `Fetching — ${retryingCount} retrying in parallel…`
    : 'Fetching all ASINs…';
  document.getElementById('progressBar').style.width     = pct + '%';
  document.getElementById('progressCount').textContent   = `${done} / ${total}`;
  document.getElementById('progressCurrent').textContent = retryingCount > 0
    ? `✅ ${done} done · 🔄 ${retryingCount} retrying…`
    : `Fetched ${done} of ${total}…`;
}

      <td><span class="tbl-badge ${availClass(r.availability)}">${r.availability || 'Unknown'}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('bulkResults').classList.add('show');
}

/* ── Download CSV ──────────────────────────────────────────────────────── */
function downloadCSV() {
  const now     = new Date().toISOString().slice(0, 10);
  const headers = ['#','ASIN','Title','Price (INR)','Rating','Availability','Status','URL','Fetched At'];
  const rows    = bulkResults.map((r, i) => [
    i + 1,
    r.asin || '',
    `"${(r.title || r.error || '').replace(/"/g, '""')}"`,
    r.price  || '',
    r.rating || '',
    r.availability || '',
    isFailed(r) ? 'Failed' : 'Success',
    r.url || `https://www.amazon.in/dp/${r.asin}`,
    `"${new Date().toLocaleString('en-IN')}"`,
  ]);
  const csv  = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }); // BOM for Excel compatibility
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `price-scout-${now}.csv`;
  a.click();
}

/* ── Download Excel ────────────────────────────────────────────────────── */
function downloadXLSX() {
  const now    = new Date().toISOString().slice(0, 10);
  const domain = document.getElementById('domain').value;

  // Main data sheet
  const wsData = [
    ['#', 'ASIN', 'Title', 'Price (INR)', 'Rating', 'Availability', 'Status', 'Amazon URL', 'Fetched At'],
    ...bulkResults.map((r, i) => [
      i + 1,
      r.asin || '',
      r.title || r.error || '',
      r.price  || '',
      r.rating || '',
      r.availability || '',
      isFailed(r) ? 'Failed' : 'Success',
      r.url || `https://www.amazon.in/dp/${r.asin}`,
      new Date().toLocaleString('en-IN'),
    ])
  ];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [
    { wch: 4  }, { wch: 14 }, { wch: 55 }, { wch: 12 },
    { wch: 8  }, { wch: 15 }, { wch: 10 }, { wch: 42 }, { wch: 22 },
  ];
  XLSX.utils.book_append_sheet(wb, ws, 'All Products');

  // Failed sheet — easy to re-upload
  const failedRows = bulkResults.filter(isFailed);
  if (failedRows.length > 0) {
    const failData = [
      ['ASIN', 'Error', 'Amazon URL'],
      ...failedRows.map(r => [
        r.asin || '',
        r.error || 'No data fetched',
        `https://www.amazon.in/dp/${r.asin}`,
      ])
    ];
    const wsFail = XLSX.utils.aoa_to_sheet(failData);
    wsFail['!cols'] = [{ wch: 14 }, { wch: 30 }, { wch: 42 }];
    XLSX.utils.book_append_sheet(wb, wsFail, 'Failed ASINs');
  }

  // Summary sheet
  const successCount  = bulkResults.filter(r => !isFailed(r)).length;
  const outOfStock    = bulkResults.filter(r => r.availability === 'Out of Stock').length;
  const prices        = bulkResults.filter(r => r.price).map(r => r.price);
  const avgPrice      = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : 0;
  const minPrice      = prices.length ? Math.min(...prices) : 0;
  const maxPrice      = prices.length ? Math.max(...prices) : 0;

  const summaryData = [
    ['Price Scout Report — Summary'],
    [''],
    ['Generated',          new Date().toLocaleString('en-IN')],
    ['Domain',             domain],
    [''],
    ['Total ASINs',        bulkResults.length],
    ['Successfully Fetched', successCount],
    ['Failed / Not Found', failedRows.length],
    ['Out of Stock',       outOfStock],
    [''],
    ['Average Price (INR)', avgPrice],
    ['Min Price (INR)',     minPrice],
    ['Max Price (INR)',     maxPrice],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(summaryData);
  ws2['!cols'] = [{ wch: 25 }, { wch: 30 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

  XLSX.writeFile(wb, `price-scout-${now}.xlsx`);
}
</script>
